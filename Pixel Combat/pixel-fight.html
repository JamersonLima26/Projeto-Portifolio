<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PIXEL KOMBAT</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
:root{
  --black:#0a0a0f;--darkbg:#12121c;--panel:#1a1a2e;--border:#2a2a4a;
  --p1:#e63946;--p1l:#ff6b7a;--p2:#457b9d;--p2l:#74b3ce;
  --hp-bg:#1d1d2e;--gold:#ffd166;--white:#edf2f4;--dim:#8d99ae;
  --scanline:rgba(0,0,0,0.15);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--black);font-family:'Press Start 2P',monospace;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;overflow:hidden;image-rendering:pixelated}
body::after{content:'';position:fixed;inset:0;pointer-events:none;
  background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,var(--scanline) 3px,var(--scanline) 4px);z-index:9999}

/* ── CABINET ── */
.cabinet{width:min(760px,98vw);background:var(--darkbg);border:4px solid var(--border);
  box-shadow:0 0 0 2px #0a0a0f,0 0 60px #00000099,inset 0 0 40px #00000066;
  padding:12px;display:flex;flex-direction:column}

/* ── TITLE ── */
.title-bar{background:var(--black);border:3px solid var(--border);border-bottom:none;
  padding:8px 14px;display:flex;align-items:center;justify-content:center;position:relative}
.title-bar h1{font-size:clamp(10px,2.4vw,17px);color:var(--gold);letter-spacing:3px;
  text-shadow:3px 3px 0 #7a5c00,0 0 18px #ffd16699;animation:titlePulse 2.4s ease-in-out infinite}
@keyframes titlePulse{0%,100%{text-shadow:3px 3px 0 #7a5c00,0 0 12px #ffd16688}50%{text-shadow:3px 3px 0 #7a5c00,0 0 30px #ffd166cc}}
.insert-coin{position:absolute;right:14px;font-size:6px;color:var(--dim);animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── HUD ── */
.hud{background:var(--black);border:3px solid var(--border);border-bottom:none;
  padding:10px 14px 8px;display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center}
.player-info{display:flex;flex-direction:column;gap:6px}
.player-info.pi2{align-items:flex-end}
.player-name{font-size:7px;letter-spacing:1.5px}
.pi1 .player-name{color:var(--p1l);text-shadow:0 0 8px var(--p1)}
.pi2 .player-name{color:var(--p2l);text-shadow:0 0 8px var(--p2)}
.hp-track{width:100%;height:14px;background:var(--hp-bg);border:2px solid #2a2a4a;position:relative;overflow:hidden}
.hp-bar{height:100%;transition:width 0.1s steps(5);position:relative}
.pi1 .hp-bar{background:var(--p1);box-shadow:inset 0 2px 0 #ff8090,inset 0 -2px 0 #8a1020;float:right}
.pi2 .hp-bar{background:var(--p2);box-shadow:inset 0 2px 0 #74b3ce,inset 0 -2px 0 #1a4a6a;float:left}
.hp-track::after{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent 0 6px,rgba(0,0,0,0.25) 6px 8px)}
.gauge-row{display:flex;gap:3px}
.gauge-pip{width:10px;height:6px;border:1.5px solid #2a2a4a;background:#1a1a2e}
.pi1 .gauge-pip.lit{background:var(--gold);box-shadow:0 0 6px var(--gold)}
.pi2 .gauge-pip.lit{background:var(--p2l);box-shadow:0 0 6px var(--p2l)}
.center-hud{display:flex;flex-direction:column;align-items:center;gap:4px}
.round-label{font-size:5px;color:var(--dim);letter-spacing:1px}
.timer{font-size:clamp(18px,4vw,28px);color:var(--white);text-shadow:2px 2px 0 #555,0 0 20px #ffffffaa;line-height:1}
.timer.urgent{color:var(--p1);animation:tPulse .5s ease-in-out infinite}
@keyframes tPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.round-pips{display:flex;gap:5px}
.round-pip{width:8px;height:8px;border:2px solid #444}
.round-pip.won{background:var(--gold);border-color:var(--gold);box-shadow:0 0 6px var(--gold)}

/* ── VIEWPORT ── */
.viewport{background:var(--black);border:3px solid var(--border);border-bottom:none;
  position:relative;height:280px;overflow:hidden}

/* Canvas FX sits on top of everything except the overlay */
#fxCanvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:30}

/* Screen flash */
#flashEl{position:absolute;inset:0;pointer-events:none;opacity:0;z-index:31;transition:opacity 0.04s}

.bg-sky{position:absolute;inset:0;background:linear-gradient(to bottom,#0d0d1a 0%,#1a0a2e 30%,#2e0a1a 60%,#1a1010 100%)}
.bg-moon{position:absolute;top:18px;right:80px;width:28px;height:28px;background:var(--gold);box-shadow:0 0 0 4px #0d0d1a,0 0 30px #ffd16666}
.bg-moon::after{content:'';position:absolute;top:4px;left:4px;width:8px;height:8px;background:#1a0a2e}
.bg-city{position:absolute;bottom:56px;left:0;right:0;height:90px;
  background:repeating-linear-gradient(90deg,transparent 0 6px,#0d0a18 6px 22px,transparent 22px 28px,#0d0a18 28px 38px,transparent 38px 42px,#0d0a18 42px 60px,transparent 60px 68px,#0d0a18 68px 86px);opacity:.9}
.bg-windows{position:absolute;bottom:56px;left:0;right:0;height:80px;
  background:radial-gradient(1px 1px at 24px 20px,var(--gold) 0%,transparent 100%),radial-gradient(1px 1px at 70px 16px,var(--gold) 0%,transparent 100%),radial-gradient(1px 1px at 110px 8px,var(--gold) 0%,transparent 100%),radial-gradient(1px 1px at 200px 10px,var(--p2) 0%,transparent 100%),radial-gradient(1px 1px at 300px 14px,var(--p2) 0%,transparent 100%),radial-gradient(1px 1px at 400px 8px,var(--gold) 0%,transparent 100%),radial-gradient(1px 1px at 500px 12px,var(--gold) 0%,transparent 100%),radial-gradient(1px 1px at 600px 10px,var(--p2) 0%,transparent 100%),radial-gradient(1px 1px at 700px 20px,var(--gold) 0%,transparent 100%);background-repeat:no-repeat}
.bg-ground{position:absolute;bottom:0;left:0;right:0;height:56px;background:var(--panel);
  border-top:4px solid #2e2e50;box-shadow:0 -4px 0 #1a1a32,inset 0 4px 0 #2a2a44}
.bg-ground::after{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent 0 39px,rgba(0,0,0,.3) 39px 43px),
             repeating-linear-gradient(180deg,transparent 0 11px,rgba(0,0,0,.15) 11px 15px)}

/* ── FIGHTERS ── */
.fighters{position:absolute;bottom:56px;left:0;right:0}
.fighter{width:48px;height:80px;position:absolute;bottom:0;image-rendering:pixelated;will-change:transform}

/* ── ATTACK STATES ── Each now has a dedicated, snappier keyframe ── */
.fighter.idle     {animation:idleBob  .7s  steps(2)  infinite}
.fighter.walk-fwd {animation:walkFwd  .28s steps(2)  infinite}
.fighter.walk-bck {animation:walkBck  .28s steps(2)  infinite}
.fighter.jump     {animation:none}
.fighter.punch    {animation:punchFwd .13s steps(4)  forwards}
.fighter.kick     {animation:kickSwing .18s steps(4) forwards}
.fighter.upcut    {animation:upcutRise .22s steps(4) forwards}
.fighter.special  {animation:specialCharge .2s steps(4) forwards}
.fighter.hit      {animation:hitRecoil .15s steps(3) forwards;filter:brightness(3) saturate(2)}
.fighter.block    {animation:blockStance .6s steps(2) infinite;filter:brightness(.55) sepia(.8)}
.fighter.ko       {animation:koFall .55s steps(5) forwards}

@keyframes idleBob   {0%,100%{transform:translateY(0)}         50%{transform:translateY(-4px)}}
@keyframes walkFwd   {0%{transform:translateY(0)  skewX(4deg)} 50%{transform:translateY(-3px) skewX(-4deg)}}
@keyframes walkBck   {0%{transform:translateY(0)  skewX(-4deg)}50%{transform:translateY(-3px) skewX(4deg)}}
@keyframes punchFwd  {
  0%  {transform:translateX(0)       scaleX(1)}
  25% {transform:translateX(6px)     scaleX(1.04)}
  55% {transform:translateX(20px)    scaleX(1.1) skewX(-6deg)}
  80% {transform:translateX(10px)    scaleX(1.02)}
  100%{transform:translateX(0)       scaleX(1)}
}
@keyframes kickSwing {
  0%  {transform:rotate(0deg)    translateY(0)}
  20% {transform:rotate(-6deg)   translateY(-4px) skewY(-3deg)}
  50% {transform:rotate(-18deg)  translateY(-14px) skewY(-6deg) scaleX(1.08)}
  80% {transform:rotate(-6deg)   translateY(-4px)}
  100%{transform:rotate(0deg)    translateY(0)}
}
@keyframes upcutRise {
  0%  {transform:translateY(0)   rotate(0deg)}
  30% {transform:translateY(-10px) rotate(8deg) scaleX(1.1)}
  60% {transform:translateY(-22px) rotate(20deg) scaleX(1.15)}
  100%{transform:translateY(0)   rotate(0deg)}
}
@keyframes specialCharge{
  0%  {transform:scaleX(0.85) scaleY(1.06)}
  30% {transform:scaleX(1.12) scaleY(0.92)}
  60% {transform:scaleX(0.9)  scaleY(1.08)}
  100%{transform:scaleX(1)    scaleY(1)}
}
@keyframes hitRecoil {
  0%  {transform:translateX(0)     skewX(0deg)}
  20% {transform:translateX(-14px) skewX(8deg)  scaleX(.9)}
  60% {transform:translateX(-6px)  skewX(3deg)}
  100%{transform:translateX(0)     skewX(0deg)}
}
@keyframes blockStance{
  0%,100%{transform:translateY(0)  scaleX(.92)}
  50%    {transform:translateY(-2px) scaleX(.94)}
}
@keyframes koFall{
  0%  {transform:rotate(0deg)   translateY(0)   scaleY(1)}
  40% {transform:rotate(-40deg) translateY(8px) scaleY(.95)}
  70% {transform:rotate(-70deg) translateY(18px)scaleY(.88)}
  100%{transform:rotate(-90deg) translateY(28px)scaleY(.8)}
}

/* Fighter body parts */
.fighter .head{position:absolute;top:0;left:12px;width:24px;height:20px}
.fighter.f1 .head{background:#e8c49a;box-shadow:0 0 0 2px #c09070}
.fighter.f2 .head{background:#a0c8e8;box-shadow:0 0 0 2px #6090b8}
.fighter .hair{position:absolute;top:0;left:10px;width:28px;height:8px}
.fighter.f1 .hair{background:var(--p1)}
.fighter.f2 .hair{background:var(--p2l)}
.fighter .eye{position:absolute;top:8px;left:18px;width:4px;height:4px;background:#1a1a1a}
.fighter .body{position:absolute;top:20px;left:8px;width:32px;height:26px}
.fighter.f1 .body{background:var(--p1);box-shadow:inset 0 2px 0 var(--p1l),inset 0 -2px 0 #8a1020}
.fighter.f2 .body{background:var(--p2);box-shadow:inset 0 2px 0 var(--p2l),inset 0 -2px 0 #1a4060}
.fighter .belt{position:absolute;top:44px;left:10px;width:28px;height:6px;background:var(--gold)}
.fighter .leg-l,.fighter .leg-r{position:absolute;width:12px;height:30px;top:50px}
.fighter .leg-l{left:8px}.fighter .leg-r{left:26px}
.fighter.f1 .leg-l,.fighter.f1 .leg-r{background:#222;box-shadow:inset 0 2px 0 #444}
.fighter.f2 .leg-l,.fighter.f2 .leg-r{background:#1a3050;box-shadow:inset 0 2px 0 #2a5080}
.fighter .boot-l,.fighter .boot-r{position:absolute;width:14px;height:10px;top:70px}
.fighter .boot-l{left:6px}.fighter .boot-r{left:24px}
.fighter.f1 .boot-l,.fighter.f1 .boot-r{background:#8a3020}
.fighter.f2 .boot-l,.fighter.f2 .boot-r{background:#1a3050}
.fighter .arm{position:absolute;width:10px;height:22px;top:22px;left:36px}
.fighter.f1 .arm{background:var(--p1)}.fighter.f2 .arm{background:var(--p2)}
.fighter .fist{position:absolute;width:12px;height:12px;top:38px;left:34px}
.fighter.f1 .fist{background:#e8c49a;border:2px solid #c09070}
.fighter.f2 .fist{background:#a0c8e8;border:2px solid #6090b8}

/* Motion trail clones */
.trail{position:absolute;bottom:56px;width:48px;height:80px;pointer-events:none;z-index:5;opacity:.35;image-rendering:pixelated}

/* Projectile */
.projectile{position:absolute;width:20px;height:20px;z-index:20;pointer-events:none}
.proj-core{width:100%;height:100%;clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);animation:pspin .15s steps(4) infinite}
.f1-proj .proj-core{background:var(--gold);box-shadow:0 0 14px var(--gold),0 0 28px #ffd16688}
.f2-proj .proj-core{background:var(--p2l);box-shadow:0 0 14px var(--p2l),0 0 28px #74b3ce88}
.proj-aura{position:absolute;inset:-6px;border-radius:50%;animation:paura .2s steps(2) infinite}
.f1-proj .proj-aura{background:radial-gradient(ellipse,#ffd16644 0%,transparent 70%)}
.f2-proj .proj-aura{background:radial-gradient(ellipse,#74b3ce44 0%,transparent 70%)}
@keyframes pspin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
@keyframes paura{0%,100%{transform:scale(1)}50%{transform:scale(1.4)}}

/* Center fight text */
.fight-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:clamp(14px,3.5vw,22px);color:var(--gold);letter-spacing:4px;
  text-shadow:3px 3px 0 #7a5c00,0 0 30px var(--gold);
  white-space:nowrap;pointer-events:none;opacity:0;z-index:50}
.fight-text.show{opacity:1;animation:ftIn .1s steps(3) forwards}
@keyframes ftIn{0%{transform:translate(-50%,-50%) scale(2.2)}100%{transform:translate(-50%,-50%) scale(1)}}

/* Overlay */
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
  background:rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:opacity .25s;z-index:60}
.overlay.show{opacity:1;pointer-events:all}
.overlay-title{font-size:clamp(16px,4vw,28px);color:var(--gold);letter-spacing:4px;text-shadow:3px 3px 0 #7a5c00,0 0 30px var(--gold)}
.overlay-sub{font-size:7px;color:var(--white);letter-spacing:2px;animation:blink 1s step-end infinite}

/* Combo */
.combo-el{position:absolute;font-size:9px;letter-spacing:1px;text-shadow:2px 2px 0 #000;
  pointer-events:none;opacity:0;transition:opacity .2s;top:28%;z-index:32}
.combo-el.c1{left:14px;color:var(--p1l)}.combo-el.c2{right:14px;color:var(--p2l)}
.combo-el.show{opacity:1}

/* DMG float */
.dmg-float{position:absolute;font-size:9px;text-shadow:2px 2px 0 #000;
  pointer-events:none;animation:floatUp .75s steps(8) forwards;z-index:40}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1.3)}100%{opacity:0;transform:translateY(-44px) scale(.8)}}

/* Hit label (CRITICAL! etc) */
.hit-label{position:absolute;font-size:7px;letter-spacing:2px;pointer-events:none;
  animation:labelPop .6s steps(5) forwards;z-index:41}
@keyframes labelPop{0%{opacity:1;transform:scale(1.6)}60%{transform:scale(1)}100%{opacity:0;transform:scale(.8)}}

/* ── CONTROLS ── */
.controls-panel{background:var(--black);border:3px solid var(--border);padding:10px 14px;
  display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:start}
.ctrl-side{display:flex;flex-direction:column;gap:8px}
.ctrl-label{font-size:5px;color:var(--dim);letter-spacing:1.5px;margin-bottom:2px}
.ctrl-row{display:flex;gap:5px;flex-wrap:wrap}
.dpad{display:grid;grid-template-columns:repeat(3,16px);grid-template-rows:repeat(3,16px);gap:1px}
.dpad-btn{background:var(--panel);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:7px;color:var(--dim);cursor:pointer;user-select:none}
.dpad-btn:hover{background:#2a2a4a}.dpad-btn.active{background:var(--border);color:var(--white)}
.dpad-center{background:#0d0d18!important;cursor:default}
.action-btns{display:flex;flex-direction:column;gap:4px}
.btn-row{display:flex;gap:5px}
.act-btn{width:26px;height:26px;border:2px solid;font-size:5px;cursor:pointer;
  font-family:'Press Start 2P',monospace;display:flex;align-items:center;justify-content:center;
  user-select:none;transition:filter .05s,transform .05s}
.act-btn:hover{filter:brightness(1.3)}.act-btn.active{transform:scale(.88);filter:brightness(1.8)}
.btn-y{background:#2e1a3e;border-color:#9b4dca;color:#9b4dca}
.btn-x{background:#1a2e3e;border-color:var(--p2l);color:var(--p2l)}
.btn-b{background:#1a2e1a;border-color:#06d6a0;color:#06d6a0}
.btn-a{background:#2e1a1a;border-color:var(--p1l);color:var(--p1l)}
.vs-block{display:flex;flex-direction:column;align-items:center;gap:4px}
.vs-text{font-size:10px;color:var(--gold);text-shadow:2px 2px 0 #7a5c00}
.credits{font-size:5px;color:var(--dim);letter-spacing:1px;margin-top:2px}
.moves-list{display:flex;flex-direction:column;gap:4px}
.move-entry{display:flex;align-items:center;gap:5px}
.move-name{font-size:5px;color:var(--dim);min-width:70px}
.move-input{display:flex;gap:2px;align-items:center}
.move-key{font-size:4px;padding:1px 3px;background:var(--panel);border:1px solid var(--border);color:var(--white)}
.move-sep{font-size:5px;color:var(--dim)}
.status-bar{background:var(--black);border:3px solid var(--border);border-top:1px solid #2a2a4a;
  padding:5px 14px;display:flex;justify-content:space-between;align-items:center}
.status-text{font-size:5px;color:var(--dim);letter-spacing:1.5px}
.status-blink{animation:blink 1s step-end infinite;color:var(--gold)}
</style>
</head>
<body>
<div class="cabinet">

<div class="title-bar">
  <h1>⚔ PIXEL KOMBAT ⚔</h1>
  <span class="insert-coin">INSERIR FICHA</span>
</div>

<div class="hud">
  <div class="player-info pi1">
    <span class="player-name">P1 RYU-X</span>
    <div class="hp-track"><div class="hp-bar" id="p1hp" style="width:100%"></div></div>
    <div class="gauge-row" id="p1gauge">
      <div class="gauge-pip"></div><div class="gauge-pip"></div><div class="gauge-pip"></div>
      <div class="gauge-pip"></div><div class="gauge-pip"></div>
    </div>
  </div>
  <div class="center-hud">
    <span class="round-label" id="roundLabel">ROUND 1</span>
    <div class="timer" id="timerEl">60</div>
    <div class="round-pips"><div class="round-pip" id="rp1a"></div><div class="round-pip" id="rp1b"></div></div>
  </div>
  <div class="player-info pi2">
    <span class="player-name">P2 KAI-7</span>
    <div class="hp-track"><div class="hp-bar" id="p2hp" style="width:100%"></div></div>
    <div class="gauge-row" style="flex-direction:row-reverse" id="p2gauge">
      <div class="gauge-pip"></div><div class="gauge-pip"></div><div class="gauge-pip"></div>
      <div class="gauge-pip"></div><div class="gauge-pip"></div>
    </div>
  </div>
</div>

<div class="viewport" id="viewport">
  <div class="bg-sky"></div>
  <div class="bg-moon"></div>
  <div class="bg-city"></div>
  <div class="bg-windows"></div>
  <div class="bg-ground"></div>

  <canvas id="fxCanvas"></canvas>
  <div id="flashEl"></div>

  <div class="fighters">
    <div class="fighter f1 idle" id="f1">
      <div class="hair"></div><div class="head"><div class="eye"></div></div>
      <div class="arm"></div><div class="fist"></div><div class="body"></div>
      <div class="belt"></div><div class="leg-l"></div><div class="leg-r"></div>
      <div class="boot-l"></div><div class="boot-r"></div>
    </div>
    <div class="fighter f2 idle" id="f2">
      <div class="hair"></div><div class="head"><div class="eye"></div></div>
      <div class="arm"></div><div class="fist"></div><div class="body"></div>
      <div class="belt"></div><div class="leg-l"></div><div class="leg-r"></div>
      <div class="boot-l"></div><div class="boot-r"></div>
    </div>
  </div>

  <div class="fight-text" id="fightText"></div>
  <div class="overlay" id="overlay">
    <div class="overlay-title" id="oTitle">K.O.!</div>
    <div class="overlay-sub" id="oSub">PRESSIONE ESPAÇO</div>
  </div>
  <div class="combo-el c1" id="comb1"></div>
  <div class="combo-el c2" id="comb2"></div>
</div>

<div class="controls-panel">
  <div class="ctrl-side">
    <div class="ctrl-label">P1 — WASD + E/F/R/G</div>
    <div class="ctrl-row">
      <div class="dpad">
        <div class="dpad-btn"></div><div class="dpad-btn" data-key="w">▲</div><div class="dpad-btn"></div>
        <div class="dpad-btn" data-key="a">◀</div><div class="dpad-btn dpad-center"></div><div class="dpad-btn" data-key="d">▶</div>
        <div class="dpad-btn"></div><div class="dpad-btn" data-key="s">▼</div><div class="dpad-btn"></div>
      </div>
      <div class="action-btns">
        <div class="btn-row">
          <button class="act-btn btn-y" data-key="g">SP</button>
          <button class="act-btn btn-x" data-key="f">KK</button>
        </div>
        <div class="btn-row">
          <button class="act-btn btn-b" data-key="r">BL</button>
          <button class="act-btn btn-a" data-key="e">PU</button>
        </div>
      </div>
    </div>
    <div class="moves-list">
      <div class="move-entry"><span class="move-name">HADOKEN</span>

<script>
'use strict';

// ── Constants ──────────────────────────────────────────────
const VW=700, FIGHTER_W=48, SPEED=3.2, JUMP_VEL=14, GRAVITY=1.1;
const MAX_HP=100, ROUND_SEC=60, WIN_ROUNDS=2;

// ── Global state ───────────────────────────────────────────
let phase='intro', roundNum=1, scores=[0,0], timeLeft=ROUND_SEC;
let timerTick=null, rafId=null;
const K={};

// ── DOM ────────────────────────────────────────────────────
const vp        = document.getElementById('viewport');
const fxCanvas  = document.getElementById('fxCanvas');
const flashEl   = document.getElementById('flashEl');
const fightText = document.getElementById('fightText');
const overlay   = document.getElementById('overlay');
const oTitle    = document.getElementById('oTitle');
const oSub      = document.getElementById('oSub');
const timerEl   = document.getElementById('timerEl');
const roundLabel= document.getElementById('roundLabel');
const statusMsg = document.getElementById('statusMsg');

// ── Canvas FX ──────────────────────────────────────────────
const ctx = fxCanvas.getContext('2d');
function resizeCanvas(){
  fxCanvas.width  = vp.clientWidth;
  fxCanvas.height = vp.clientHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── Particle system ────────────────────────────────────────
const particles = [];

function spawnParticles(wx, wy, opts){
  const count  = opts.count  || 12;
  const colors = opts.colors || ['#ffd166','#fff','#ff6b7a'];
  const speed  = opts.speed  || 4;
  const life   = opts.life   || 22;
  const size   = opts.size   || 4;
  const gravity= opts.gravity!== undefined ? opts.gravity : 0.3;
  for(let i=0;i<count;i++){
    const angle = Math.random()*Math.PI*2;
    const spd   = (Math.random()*0.8+0.2)*speed;
    particles.push({
      x:wx, y:wy,
      vx: Math.cos(angle)*spd,
      vy: Math.sin(angle)*spd - Math.random()*2,
      life, maxLife:life,
      color: colors[Math.floor(Math.random()*colors.length)],
      size: size*(0.5+Math.random()*0.8),
      gravity, square: opts.square||false
    });
  }
}

function spawnShockwave(wx, wy, color){
  particles.push({
    x:wx, y:wy, r:4, maxR:55, life:14, maxLife:14,
    color: color||'#ffd166', isWave:true
  });
}

function spawnSlash(wx, wy, dir, color){
  // Slash arc as a series of line segments stored as particles
  for(let i=0;i<6;i++){
    const angle = (dir>0?-0.5:Math.PI+0.5) + (i-2.5)*0.18;
    const r1=20, r2=45;
    particles.push({
      isSlash:true,
      x1: wx + Math.cos(angle)*r1,
      y1: wy + Math.sin(angle)*r1,
      x2: wx + Math.cos(angle)*r2,
      y2: wy + Math.sin(angle)*r2,
      life:8, maxLife:8,
      color: color||'#ffffffcc',
      width: 3-i*0.2
    });
  }
}

function tickParticles(){
  resizeCanvas();
  ctx.clearRect(0,0,fxCanvas.width,fxCanvas.height);
  const r = fxCanvas.width/VW;
  const gh= fxCanvas.height;

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.life--;
    if(p.life<=0){ particles.splice(i,1); continue; }

    const alpha = p.life/p.maxLife;

    if(p.isWave){
      p.r += (p.maxR-p.r)*0.35;
      ctx.save();
      ctx.globalAlpha = alpha*0.7;
      ctx.strokeStyle = p.color;
      ctx.lineWidth   = 3*(alpha);
      ctx.beginPath();
      ctx.arc(p.x*r, gh-56 - p.y*0, p.r, 0, Math.PI*2);
      // keep wave at impact Y
      ctx.arc(p.x*r, p.y, p.r, 0, Math.PI*2);
      ctx.stroke();
      ctx.restore();
      continue;
    }

    if(p.isSlash){
      ctx.save();
      ctx.globalAlpha = alpha*0.85;
      ctx.strokeStyle = p.color;
      ctx.lineWidth   = p.width*(alpha*1.5);
      ctx.shadowColor = p.color;
      ctx.shadowBlur  = 6;
      ctx.beginPath();
      ctx.moveTo(p.x1*r, p.y1);
      ctx.lineTo(p.x2*r, p.y2);
      ctx.stroke();
      ctx.restore();
      continue;
    }

    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += p.gravity;
    p.vx *= 0.92;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle   = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur  = 8;
    const px = p.x*r, py = p.y;
    if(p.square){
      ctx.fillRect(px-p.size/2, py-p.size/2, p.size, p.size);
    } else {
      ctx.beginPath();
      ctx.arc(px, py, p.size, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }
}

// ── Screen flash ───────────────────────────────────────────
let flashTimer=null;
function screenFlash(color, dur=80){
  flashEl.style.background = color||'#ffffff';
  flashEl.style.opacity = '0.45';
  clearTimeout(flashTimer);
  flashTimer = setTimeout(()=>{ flashEl.style.opacity='0'; }, dur);
}

// ── Viewport shake ─────────────────────────────────────────
let shakeTimer=null, shakeIntensity=0;
function shakeViewport(intensity=6, dur=180){
  shakeIntensity = intensity;
  clearTimeout(shakeTimer);
  shakeTimer = setTimeout(()=>{ vp.style.transform=''; shakeIntensity=0; }, dur);
}
let shakeFrame=0;
function applyShake(){
  if(!shakeIntensity) return;
  shakeFrame++;
  const s=shakeIntensity*(0.5+Math.random()*0.5);
  const dx=(Math.random()-0.5)*s, dy=(Math.random()-0.5)*s;
  vp.style.transform = `translate(${dx}px,${dy}px)`;
  shakeIntensity *= 0.82;
  if(shakeIntensity<0.5){ vp.style.transform=''; shakeIntensity=0; }
}

// ── Helpers ────────────────────────────────────────────────
function vpW(){ return vp.clientWidth||700; }
function ratio(){ return vpW()/VW; }
function worldToCanvas(wx, wy){
  // wy=0 means on the ground; ground is at canvas bottom-56px
  const r=ratio();
  return { x: wx*r, y: fxCanvas.height - 56 - wy };
}

// ── Fighter data ───────────────────────────────────────────
const FD=[
  {
    id:0, el:document.getElementById('f1'),
    hpEl:document.getElementById('p1hp'), gaugeEl:document.getElementById('p1gauge'),
    comboEl:document.getElementById('comb1'),
    ctrl:{left:'a',right:'d',up:'w',down:'s',punch:'e',kick:'f',block:'r',special:'g'},
    x:80, y:0, vy:0, onGround:true,
    hp:MAX_HP, gauge:0, maxGauge:5,
    state:'idle', stTimer:0, hitCD:0, blockCD:0,
    combo:0, comboTimer:0, buf:[]
  },
  {
    id:1, el:document.getElementById('f2'),
    hpEl:document.getElementById('p2hp'), gaugeEl:document.getElementById('p2gauge'),
    comboEl:document.getElementById('comb2'),
    ctrl:{left:'arrowleft',right:'arrowright',up:'arrowup',down:'arrowdown',punch:';',kick:'.',block:'/',special:','},
    x:610, y:0, vy:0, onGround:true,
    hp:MAX_HP, gauge:0, maxGauge:5,
    state:'idle', stTimer:0, hitCD:0, blockCD:0,
    combo:0, comboTimer:0, buf:[]
  }
];

// ── AI ─────────────────────────────────────────────────────
const AI={thinkCd:0, cmd:'idle'};

// ── Projectiles ────────────────────────────────────────────
const projs=[];

// ── Motion trails ─────────────────────────────────────────
const trails=[];  // {el, life, maxLife}

function spawnTrail(f){
  const t = f.el.cloneNode(true);
  t.className = 'trail';
  t.style.left   = f.el.style.left;
  t.style.bottom = f.el.style.bottom;
  t.style.transform = f.el.style.transform;
  t.style.filter = f.id===0
    ? 'brightness(0) sepia(1) hue-rotate(340deg) saturate(4) opacity(.5)'
    : 'brightness(0) sepia(1) hue-rotate(190deg) saturate(4) opacity(.5)';
  vp.querySelector('.fighters').appendChild(t);
  trails.push({ el:t, life:8, maxLife:8 });
}

function tickTrails(){
  for(let i=trails.length-1;i>=0;i--){
    const t=trails[i];
    t.life--;
    t.el.style.opacity = (t.life/t.maxLife)*0.3;
    if(t.life<=0){ t.el.remove(); trails.splice(i,1); }
  }
}

// ── setState ───────────────────────────────────────────────
const STATE_DUR={punch:18,kick:24,upcut:26,special:20,hit:16,ko:99999};
function setState(f,s){
  if(f.state===s&&!STATE_DUR[s]) return;
  f.state=s; f.stTimer=STATE_DUR[s]||0;
  const all=['idle','walk-fwd','walk-bck','jump','punch','kick','upcut','special','hit','block','ko'];
  f.el.classList.remove(...all);
  f.el.classList.add(s);
}

// ── updatePos ──────────────────────────────────────────────
function updatePos(f){
  const r=ratio();
  f.el.style.left  = (f.x*r)+'px';
  f.el.style.bottom= (56+f.y)+'px';
  const opp=FD[1-f.id];
  if(f.id===0) f.el.style.transform = opp.x>f.x ? '' : 'scaleX(-1)';
  else         f.el.style.transform = opp.x<f.x ? 'scaleX(-1)' : '';
}
function updateHP(f){
  const pct=Math.max(0,f.hp/MAX_HP*100);
  f.hpEl.style.width=pct+'%';
  f.hpEl.style.background = pct<25?'var(--p1)':pct<50?'#ffd166':(f.id===0?'var(--p1)':'var(--p2)');
}
function updateGauge(f){
  f.gaugeEl.querySelectorAll('.gauge-pip').forEach((p,i)=>p.classList.toggle('lit',i<f.gauge));
}

// ── Fight text / overlays ──────────────────────────────────
let ftT=null;
function showText(txt,dur=1100){
  fightText.textContent=txt; fightText.classList.add('show');
  clearTimeout(ftT); ftT=setTimeout(()=>fightText.classList.remove('show'),dur);
}

// ── Damage float + hit label ───────────────────────────────
function dmgFloat(f,dmg,color){
  const r=ratio();
  const el=document.createElement('div');
  el.className='dmg-float'; el.textContent='-'+dmg; el.style.color=color||'#ffd166';
  el.style.left=(f.x*r+10)+'px'; el.style.top=(vp.clientHeight-155)+'px';
  vp.appendChild(el); setTimeout(()=>el.remove(),800);
}
function hitLabel(f, txt, color){
  const r=ratio();
  const el=document.createElement('div');
  el.className='hit-label'; el.textContent=txt; el.style.color=color||'#fff';
  el.style.left=(f.x*r-10)+'px'; el.style.top=(vp.clientHeight-185)+'px';
  el.style.textShadow=`2px 2px 0 #000, 0 0 12px ${color||'#fff'}`;
  vp.appendChild(el); setTimeout(()=>el.remove(),650);
}

// ── Combo ──────────────────────────────────────────────────
function showCombo(f){
  f.comboEl.textContent=f.combo+' HIT!'; f.comboEl.classList.add('show');
  clearTimeout(f._cc); f._cc=setTimeout(()=>f.comboEl.classList.remove('show'),1400);
}

// ── ATTACK EFFECTS (the heart of this update) ──────────────
function fxPunch(attacker, target, hit){
  const cp = worldToCanvas(target.x+24, vp.clientHeight - 56 - 40);
  const dir= target.x>attacker.x ? 1 : -1;
  const col= attacker.id===0 ? ['#ffd166','#ff6b7a','#fff'] : ['#74b3ce','#ffd166','#fff'];

  if(hit){
    // Shockwave ring
    spawnShockwave(target.x+24, cp.y, attacker.id===0?'#ff6b7a88':'#74b3ce88');
    // Impact particles
    spawnParticles(cp.x/ratio(), cp.y, {
      count:18, colors:col, speed:5.5, life:20, size:3, gravity:0.4, square:true
    });
    // Slash lines
    spawnSlash(cp.x/ratio(), cp.y, dir, attacker.id===0?'#ff6b7acc':'#74b3cecc');
    screenFlash(attacker.id===0?'#ff293944':'#1a6aaa44', 90);
    shakeViewport(5, 150);
  } else {
    // Whiff
    spawnParticles(attacker.x+(dir>0?48:0), cp.y, {
      count:6, colors:['#ffffff44'], speed:2, life:10, size:2
    });
  }
}

function fxKick(attacker, target, hit){
  const cp = worldToCanvas(target.x+24, vp.clientHeight-56-55);
  const col= attacker.id===0 ? ['#ff6b7a','#e63946','#ffd166'] : ['#74b3ce','#457b9d','#ffd166'];

  if(hit){
    spawnShockwave(target.x+24, cp.y, attacker.id===0?'#e6394666':'#457b9d66');
    spawnParticles(cp.x/ratio(), cp.y, {
      count:22, colors:col, speed:6.5, life:24, size:4, gravity:0.5
    });
    spawnSlash(cp.x/ratio(), cp.y, attacker.x<target.x?1:-1,
      attacker.id===0?'#e63946bb':'#74b3cebb');
    screenFlash(attacker.id===0?'#e6394455':'#1a6aaa33', 110);
    shakeViewport(7, 180);
  } else {
    spawnParticles(attacker.x+24, cp.y, {count:8,colors:['#ffffff33'],speed:3,life:12,size:2});
  }
}

function fxUppercut(attacker, target, hit){
  const cp = worldToCanvas(target.x+24, vp.clientHeight-56-70);
  if(hit){
    spawnShockwave(target.x+24, cp.y, '#ffd16688');
    spawnParticles(cp.x/ratio(), cp.y, {
      count:28, colors:['#ffd166','#fff','#ff6b7a','#74b3ce'], speed:8,
      life:28, size:5, gravity:-0.1, square:false
    });
    // Extra upward stream
    spawnParticles(target.x+24, cp.y, {
      count:14, colors:['#ffffffcc','#ffd166aa'],
      speed:10, life:20, size:3, gravity:-0.8
    });
    spawnSlash(cp.x/ratio(), cp.y, 1, '#ffffffcc');
    screenFlash('#ffd16644', 130);
    shakeViewport(9, 220);
    hitLabel(target, 'UPPERCUT!', '#ffd166');
  }
}

function fxBlock(target){
  const cp = worldToCanvas(target.x+24, vp.clientHeight-56-30);
  spawnParticles(cp.x/ratio(), cp.y, {
    count:10, colors:['#8d99ae','#2a2a4a','#ffffff88'], speed:3, life:14, size:2.5, square:true
  });
  spawnShockwave(target.x+24, cp.y, '#8d99ae55');
  screenFlash('#ffffff22', 50);
}

function fxSpecial(f){
  const cp = worldToCanvas(f.x+24, vp.clientHeight-56-40);
  const col= f.id===0 ? ['#ffd166','#ff6b7a','#fff','#e63946'] : ['#ffd166','#74b3ce','#fff','#457b9d'];
  spawnParticles(cp.x/ratio(), cp.y, {
    count:30, colors:col, speed:7, life:30, size:5, gravity:0.1
  });
  spawnShockwave(f.x+24, cp.y, f.id===0?'#ffd16677':'#74b3ce77');
  screenFlash(f.id===0?'#ffd16655':'#74b3ce55', 120);
  shakeViewport(4, 100);
}

function fxKO(f){
  const cp = worldToCanvas(f.x+24, vp.clientHeight-56-30);
  for(let i=0;i<3;i++){
    setTimeout(()=>{
      spawnShockwave(f.x+24, cp.y, '#ffd16699');
      spawnParticles(cp.x/ratio(), cp.y, {
        count:20, colors:['#ffd166','#fff','#e63946','#74b3ce'], speed:6, life:25, size:4
      });
      screenFlash('#ffd16633', 80);
    }, i*120);
  }
  shakeViewport(12, 350);
  hitLabel(f, 'K.O.!!', '#ffd166');
}

// ── Apply damage ────────────────────────────────────────────
function applyDamage(target, attacker, rawDmg, atkType){
  let dmg=rawDmg;
  const blocked = target.state==='block'||target.blockCD>0;

  if(blocked){
    dmg=Math.max(1,Math.floor(dmg*0.12));
    dmgFloat(target, dmg, '#8d99ae');
    fxBlock(target);
  } else {
    dmgFloat(target, dmg, atkType==='kick'?'#74b3ce':atkType==='upcut'?'#ffd166':'#ff6b7a');
    setState(target,'hit'); target.hitCD=20;
    attacker.combo++; attacker.comboTimer=90;
    if(attacker.combo>=2) showCombo(attacker);
    if(attacker.combo>=3) hitLabel(target, attacker.combo+' HIT!','#ffd166');
    if(dmg>=20) hitLabel(target,'CRITICAL!','#ffd166');
  }

  target.hp=Math.max(0,target.hp-dmg);
  updateHP(target);
  attacker.gauge=Math.min(attacker.maxGauge,attacker.gauge+1);
  updateGauge(attacker);

  if(target.hp<=0){ fxKO(target); endRoundKO(target); }
}

// ── Do attack ──────────────────────────────────────────────
function doAttack(f, type){
  if(f.state==='ko'||f.state==='hit'||f.hitCD>0) return;
  setState(f, type);
  f.hitCD= type==='kick'?24:18;

  const opp  = FD[1-f.id];
  const dist = Math.abs(f.x-opp.x);
  const rng  = type==='kick'?85:65;
  const hit  = dist<=rng;

  if(type==='punch'){
    fxPunch(f, opp, hit);
    if(hit){ const dmg=9+(Math.random()*7|0); applyDamage(opp,f,dmg,'punch'); }
    // Trail during dash
    spawnTrail(f);
  }
  if(type==='kick'){
    fxKick(f, opp, hit);
    if(hit){ const dmg=14+(Math.random()*8|0); applyDamage(opp,f,dmg,'kick'); }
    spawnTrail(f); spawnTrail(f);
  }
}

function doUppercut(f){
  if(f.state==='ko') return;
  const opp=FD[1-f.id];
  setState(f,'upcut'); f.hitCD=28;
  f.vy=JUMP_VEL*0.8; f.onGround=false;
  const hit=Math.abs(f.x-opp.x)<=75;
  fxUppercut(f, opp, hit);
  if(hit){ const dmg=22+(Math.random()*10|0); applyDamage(opp,f,dmg,'upcut'); }
  // Burst trail
  for(let i=0;i<4;i++) setTimeout(()=>spawnTrail(f), i*40);
}

function doSpecial(f){
  if(f.state==='ko'||f.gauge<f.maxGauge) return;
  f.gauge=0; updateGauge(f);
  setState(f,'special');
  fxSpecial(f);
  showText('HADOKEN!', 800);

  const dir  = FD[1-f.id].x>f.x ? 1 : -1;
  const el   = document.createElement('div');
  el.className='projectile '+(f.id===0?'f1-proj':'f2-proj');
  el.innerHTML='<div class="proj-aura"></div><div class="proj-core"></div>';
  el.style.bottom=(56+38)+'px';
  vp.appendChild(el);
  const proj={el, x:f.x+(dir>0?48:-16), vx:dir*7.5, owner:f.id};
  projs.push(proj);
  updateProjPos(proj);
}

function updateProjPos(p){
  const r=ratio(); p.el.style.left=(p.x*r)+'px';
}

function tickProjectiles(){
  for(let i=projs.length-1;i>=0;i--){
    const p=projs[i]; const r=ratio();
    p.x+=p.vx;
    const px=p.x*r;
    if(px<-30||px>vpW()+30){ p.el.remove(); projs.splice(i,1); continue; }
    updateProjPos(p);

    // Projectile particle trail
    if(Math.random()<0.6){
      const cp=worldToCanvas(p.x+10, vp.clientHeight-56-48);
      spawnParticles(cp.x/ratio(), cp.y, {
        count:3,
        colors: p.owner===0?['#ffd16688','#ff6b7a66']:['#74b3ce88','#ffd16666'],
        speed:1.5, life:10, size:2, gravity:0.05
      });
    }

    const opp=FD[1-p.owner];
    if(Math.abs(p.x-opp.x)<38){
      const cp=worldToCanvas(opp.x+24, vp.clientHeight-56-44);
      spawnShockwave(opp.x+24, cp.y, p.owner===0?'#ffd16699':'#74b3ce99');
      spawnParticles(cp.x/ratio(), cp.y, {
        count:24, colors:p.owner===0?['#ffd166','#ff6b7a','#fff']:['#74b3ce','#ffd166','#fff'],
        speed:7, life:24, size:4, gravity:0.3
      });
      screenFlash(p.owner===0?'#ffd16644':'#74b3ce44', 100);
      shakeViewport(6, 160);
      hitLabel(opp,'HADOKEN!', p.owner===0?'#ffd166':'#74b3ce');
      applyDamage(opp, FD[p.owner], 20+(Math.random()*8|0), 'hadoken');
      p.el.remove(); projs.splice(i,1);
    }
  }
}

// ── Input ──────────────────────────────────────────────────
document.addEventListener('keydown', e=>{
  const k=e.key.toLowerCase();
  if(!K[k]){ K[k]=true; onPress(k); }
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
});
document.addEventListener('keyup', e=>{
  const k=e.key.toLowerCase(); K[k]=false;
  document.querySelectorAll(`[data-key="${k}"]`).forEach(el=>el.classList.remove('active'));
});

function onPress(k){
  document.querySelectorAll(`[data-key="${k}"]`).forEach(el=>el.classList.add('active'));
  if(phase==='intro'||phase==='between'||phase==='gameover'){
    if(k===' ') startRound(); return;
  }
  if(phase!=='fight') return;

  FD.forEach(f=>{
    const c=f.ctrl;
    if(k===c.up&&f.onGround&&f.state!=='ko'){
      if(f.buf.includes(c.punch)) doUppercut(f);
      else{ f.vy=JUMP_VEL; f.onGround=false; setState(f,'jump'); }
    }
    if(k===c.punch)  doAttack(f,'punch');
    if(k===c.kick)   doAttack(f,'kick');
    if(k===c.special) doSpecial(f);
    f.buf.push(k); if(f.buf.length>8) f.buf.shift();
  });
}

// ── AI ─────────────────────────────────────────────────────
function tickAI(){
  const f=FD[1], opp=FD[0];
  if(f.state==='ko'||f.state==='hit') return;
  AI.thinkCd--;
  if(AI.thinkCd>0) return;
  AI.thinkCd=10+(Math.random()*18|0);

  const dist=Math.abs(f.x-opp.x);
  const r=Math.random(), aggrBoost=1-f.hp/MAX_HP;
  K[f.ctrl.left]=K[f.ctrl.right]=K[f.ctrl.block]=false;

  if(dist>180){ K[f.ctrl.left]=f.x>opp.x; K[f.ctrl.right]=f.x<opp.x; }
  else if(dist<40){
    if(r<0.4){ K[f.ctrl.left]=f.x<opp.x; K[f.ctrl.right]=f.x>opp.x; }
    else doAttack(f, r<0.7?'punch':'kick');
  } else {
    const roll=r+aggrBoost*0.25;
    if     (roll<0.28) doAttack(f,'punch');
    else if(roll<0.46) doAttack(f,'kick');
    else if(roll<0.54){ f.vy=JUMP_VEL; f.onGround=false; setState(f,'jump'); }
    else if(roll<0.62){ K[f.ctrl.block]=true; setTimeout(()=>K[f.ctrl.block]=false,400); }
    else if(roll<0.67&&f.gauge>=f.maxGauge) doSpecial(f);
    else if(roll<0.80){ K[f.ctrl.left]=f.x>opp.x; K[f.ctrl.right]=f.x<opp.x; }
  }
}

// ── Main loop ──────────────────────────────────────────────
function tick(){
  applyShake();
  tickParticles();
  tickTrails();

  if(phase==='fight'){
    tickAI();
    FD.forEach((f,i)=>{
      const opp=FD[1-i], c=f.ctrl;
      if(f.stTimer>0){ f.stTimer--; if(f.stTimer===0&&!['idle','walk-fwd','walk-bck','jump','block','ko'].includes(f.state)) setState(f,'idle'); }
      if(f.hitCD>0)   f.hitCD--;
      if(f.blockCD>0) f.blockCD--;
      if(f.comboTimer>0){ f.comboTimer--; if(!f.comboTimer) f.combo=0; }
      if(f.state==='ko') return;

      // Block
      if(K[c.block]&&f.onGround){ if(f.state!=='block') setState(f,'block'); f.blockCD=6; }
      else if(f.state==='block'&&!K[c.block]) setState(f,'idle');

      // Move
      if(!['punch','kick','upcut','special','hit','block'].includes(f.state)){
        let moved=false;
        if(K[c.left] &&f.x>0)         { f.x-=SPEED; moved=true; if(f.onGround) setState(f,'walk-bck'); }
        if(K[c.right]&&f.x<VW-FIGHTER_W){ f.x+=SPEED; moved=true; if(f.onGround) setState(f,'walk-fwd'); }
        if(!moved&&f.onGround&&['walk-fwd','walk-bck'].includes(f.state)) setState(f,'idle');
        if(!moved&&f.onGround&&!['idle','punch','kick','upcut','special','hit'].includes(f.state)) setState(f,'idle');
      }

      // Gravity
      if(!f.onGround){ f.y+=f.vy; f.vy-=GRAVITY; if(f.y<=0){ f.y=0;f.vy=0;f.onGround=true; if(f.state==='jump') setState(f,'idle'); } }

      // Collision push
      const dx=f.x-opp.x;
      if(Math.abs(dx)<FIGHTER_W-2) f.x+=dx>=0?1.2:-1.2;
      f.x=Math.max(0,Math.min(VW-FIGHTER_W,f.x));
      updatePos(f);
    });
    tickProjectiles();
  }

  rafId=requestAnimationFrame(tick);
}

// ── Round flow ─────────────────────────────────────────────
function resetFighters(){
  FD[0].x=80;  FD[1].x=610;
  FD.forEach(f=>{
    f.y=0;f.vy=0;f.onGround=true; f.hp=MAX_HP;f.gauge=0;
    f.hitCD=0;f.blockCD=0;f.combo=0;f.comboTimer=0;f.buf=[];
    updateHP(f);updateGauge(f);setState(f,'idle');updatePos(f);
  });
  projs.forEach(p=>p.el.remove()); projs.length=0;
  trails.forEach(t=>t.el.remove()); trails.length=0;
  particles.length=0;
  Object.values(FD[1].ctrl).forEach(k=>K[k]=false);
}

function startRound(){
  resetFighters();
  overlay.classList.remove('show');
  timerEl.classList.remove('urgent');
  roundLabel.textContent='ROUND '+roundNum;
  timeLeft=ROUND_SEC; timerEl.textContent=timeLeft;
  phase='fight';
  statusMsg.textContent='▶  E=SOCO  F=CHUTE  R=BLOQUEAR  W=PULAR  G=ESPECIAL';
  showText('ROUND '+roundNum, 900);
  setTimeout(()=>showText('FIGHT!',1000),1000);
  clearInterval(timerTick);
  timerTick=setInterval(()=>{
    if(phase!=='fight') return;
    timeLeft--; timerEl.textContent=timeLeft;
    if(timeLeft<=10) timerEl.classList.add('urgent');
    if(timeLeft<=0){ clearInterval(timerTick); endRoundTime(); }
  },1000);
}

function endRoundKO(loser){
  if(phase!=='fight') return;
  phase='between'; clearInterval(timerTick);
  setState(loser,'ko');
  const winner=FD[1-loser.id];
  scores[winner.id]++; updatePips();
  showText('K.O.!',9999);
  setTimeout(()=>{
    fightText.classList.remove('show');
    if(scores[winner.id]>=WIN_ROUNDS) declareWinner(winner);
    else{
      roundNum++;
      oTitle.textContent=(winner.id===0?'P1':'P2')+' VENCEU!';
      oSub.textContent='PRESSIONE ESPAÇO PARA CONTINUAR';
      overlay.classList.add('show');
      statusMsg.textContent='▶ PRESSIONE ESPAÇO PARA CONTINUAR';
    }
  },1400);
}

function endRoundTime(){
  if(phase!=='fight') return;
  phase='between';
  const tied=FD[0].hp===FD[1].hp;
  const winner=FD[0].hp>=FD[1].hp?FD[0]:FD[1];
  if(!tied){ scores[winner.id]++; updatePips(); }
  showText('TEMPO!',9999);
  setTimeout(()=>{
    fightText.classList.remove('show');
    if(!tied&&scores[winner.id]>=WIN_ROUNDS) declareWinner(winner);
    else{
      roundNum++;
      oTitle.textContent=tied?'EMPATE!':(winner.id===0?'P1':'P2')+' VENCEU!';
      oSub.textContent='PRESSIONE ESPAÇO PARA CONTINUAR';
      overlay.classList.add('show');
      statusMsg.textContent='▶ PRESSIONE ESPAÇO PARA CONTINUAR';
    }
  },1400);
}

function declareWinner(winner){
  phase='gameover'; roundNum=1; scores=[0,0];
  document.getElementById('rp1a').classList.remove('won');
  document.getElementById('rp1b').classList.remove('won');
  oTitle.textContent=(winner.id===0?'P1':'P2')+' É O CAMPEÃO!';
  oSub.textContent='PRESSIONE ESPAÇO PARA NOVO JOGO';
  overlay.classList.add('show');
  statusMsg.textContent='▶ PRESSIONE ESPAÇO PARA NOVO JOGO';
}

function updatePips(){
  const [a,b]=[document.getElementById('rp1a'),document.getElementById('rp1b')];
  const s0=scores[0],s1=scores[1];
  if(s0>=1){a.classList.add('won');a.style.background='var(--gold)';a.style.borderColor='var(--gold)';}
  if(s0>=2){b.classList.add('won');b.style.background='var(--gold)';b.style.borderColor='var(--gold)';}
  if(s1>=1){a.classList.add('won');a.style.background='var(--p2l)';a.style.borderColor='var(--p2l)';}
  if(s1>=2){b.classList.add('won');b.style.background='var(--p2l)';b.style.borderColor='var(--p2l)';}
}

// ── Responsive ─────────────────────────────────────────────
window.addEventListener('resize',()=>{ FD.forEach(f=>updatePos(f)); projs.forEach(p=>updateProjPos(p)); resizeCanvas(); });

// ── Mobile buttons ─────────────────────────────────────────
document.querySelectorAll('[data-key]').forEach(btn=>{
  const k=btn.dataset.key;
  btn.addEventListener('pointerdown',e=>{ e.preventDefault(); if(!K[k]){K[k]=true;onPress(k);} btn.classList.add('active'); });
  const rel=e=>{ e.preventDefault(); K[k]=false; btn.classList.remove('active'); };
  btn.addEventListener('pointerup',rel); btn.addEventListener('pointercancel',rel); btn.addEventListener('pointerleave',rel);
});

// ── Boot ───────────────────────────────────────────────────
(function boot(){
  FD.forEach(f=>{updatePos(f);updateGauge(f);});
  showText('PIXEL KOMBAT',99999);
  rafId=requestAnimationFrame(tick);
})();
</script>
