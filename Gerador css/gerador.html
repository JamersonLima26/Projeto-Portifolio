<!DOCTYPE html> <!-- VERSÃO DO HTML-->

<html lang="pt-br"> <!-- LINGUAGEM DA PAGINA-->

    <head>
        <meta charset="UTF-8"> <!-- PADRAO CARACTERES -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
        <title>Gerador de CSS com IA</title> <!-- TITULO DA PAGINA-->
        <!-- Rel= relacionamento-->
        <!--CSS - cascating styleSheet (Folha de estilo)-->
        <!-- Href - É o arquivo-->

    </head>    

    <body>
        <h1>CSS Gerado <span> com IA ⚡</span>
        
        </h1> 
        <!-- <H1> É o titulo do site-->
        <!-- SPAN = Selecionar um pedaço do texto-->

        <p> Escreva o que você imagina e veja a mágica acontecer</p> <!-- PARAGRAFO DO SITE-->
        
        <!-- AREA DO TEXTO DO USUARIO!!-->
         <!-- ROWS = QUATIDADE DE LINHAS-->
        <textarea rows="3" class="caixa-texto" placeholder="Ex: Bola azul pulando"></textarea>
        <!--CRIAR UM BOTÃO-->

        <button class= "botao-gerar">Gerar codigo ⚡</button>
        
        <h2> Código</h2>
        <p class= "bloco-codigo"> </p>
        
        <h2>Preview</h2>
        <iframe class= "resultado-codigo"></iframe>


    </body>
<!-- SCRIPT = ASSOCIAR O JAVA SCRIPT COM O HTML-->
<script src="scripts.js">
    
</script>
</html>
